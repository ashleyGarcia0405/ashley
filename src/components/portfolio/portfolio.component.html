<main class="main-portfolio">
  <div class="portfolio-header">
    <h1>Portfolio</h1>
    <a routerLink="/" class="back-link">back to home</a>
  </div>

  <div class="projects-container">
    <article class="project-card" *ngFor="let project of projectsReversed">
      <div class="project-content">
        <div class="image-carousel">
          <div class="carousel-container">
            <ng-container *ngIf="project.media.length > 0">
              <ng-container [ngSwitch]="project.media[project.currentImageIndex].type">
                <img
                  *ngSwitchCase="'image'"
                  [src]="project.media[project.currentImageIndex].src"
                  [alt]="project.title + ' image ' + (project.currentImageIndex + 1)"
                  class="carousel-image"
                />
                <video
                  *ngSwitchCase="'video'"
                  class="carousel-image"
                  controls
                  playsinline
                >
                  <source [src]="project.media[project.currentImageIndex].src" type="video/quicktime" />
                  <source [src]="project.media[project.currentImageIndex].src" type="video/mp4" />
                </video>
              </ng-container>
            </ng-container>
            <button
              class="carousel-btn prev"
              (click)="prevImage(project)"
              *ngIf="project.media.length > 1"
              aria-label="Previous image"
            >
              <span class="arrow">&larr;</span>
            </button>
            <button
              class="carousel-btn next"
              (click)="nextImage(project)"
              *ngIf="project.media.length > 1"
              aria-label="Next image"
            >
              <span class="arrow">&rarr;</span>
            </button>
          </div>
          <div class="carousel-indicators" *ngIf="project.media.length > 1">
            <button
              *ngFor="let item of project.media; let i = index"
              class="indicator"
              [class.active]="i === project.currentImageIndex"
              (click)="goToImage(project, i)"
              [attr.aria-label]="'Go to item ' + (i + 1)"
            ></button>
          </div>
        </div>

        <div class="project-info">
          <h2 class="project-title">{{ project.title }}</h2>

          <div class="project-description">
            <p class="short-description" *ngIf="!project.isExpanded">
              {{ project.shortDescription }}
            </p>
            <div class="full-description" *ngIf="project.isExpanded">
              <p *ngFor="let paragraph of project.fullDescription.split('\n\n')">
                {{ paragraph }}
              </p>
            </div>
          </div>

          <button class="expand-btn" (click)="toggleExpand(project)">
            {{ project.isExpanded ? 'show less' : 'read more' }}
          </button>
        </div>
      </div>
    </article>
  </div>
</main>
