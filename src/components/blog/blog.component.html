<div class="blog-page">
    <header class="blog-page-header">
        <button class="back-btn" (click)="goHome()">← home</button>
    </header>

    <div class="blog-title-block">
        <h1>Blog</h1>
        <p class="blog-subtitle">Thoughts on tech, learning, and building things</p>
    </div>

    <div class="blog-list">
        <article class="blog-post" *ngFor="let post of blogPosts; let i = index" (click)="openPost(post)">
            <span class="post-number">{{ (i + 1).toString().padStart(2, '0') }}</span>
            <h2 class="post-title">{{ post.title }}</h2>
            <div class="post-meta">
                <span class="post-date">{{ post.date }}</span>
                <span class="post-divider">·</span>
                <span class="post-reading-time">{{ post.readingTime }} min read</span>
            </div>
            <p class="post-summary">{{ post.summary }}</p>
            <span class="read-more">Read →</span>
        </article>
    </div>
</div>
