<main class="post-main">
  <div class="post-header">
    <a routerLink="/blog" class="back-link">← back to blog</a>
    <h1 class="post-title">{{ title }}</h1>
    <div class="post-meta">
      <span>{{ date }}</span>
      <span class="divider">·</span>
      <span>{{ readingTime }} min read</span>
    </div>
  </div>

  <div class="post-body">
    <ng-content></ng-content>
  </div>
</main>
