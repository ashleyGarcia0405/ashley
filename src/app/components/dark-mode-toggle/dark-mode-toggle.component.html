<div class="header-actions">
  <a routerLink="/blog" class="header-link">blog</a>
  <button class="theme-toggle" (click)="toggleTheme()" [attr.aria-label]="isDarkMode ? 'Switch to pink mode' : 'Switch to dark mode'">
    <span class="toggle-text">{{ isDarkMode ? 'dark mode' : 'pink mode' }}</span>
  </button>
</div>
